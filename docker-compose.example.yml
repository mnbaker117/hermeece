# Hermeece docker-compose example.
#
# Copy this file to docker-compose.yml on your server and fill in
# the secrets. docker-compose.yml is gitignored so your real
# credentials never get committed.
#
# Required steps before first boot:
#   1. cp docker-compose.example.yml docker-compose.yml
#   2. Edit docker-compose.yml — fill in the env vars marked with
#      "REQUIRED" comments
#   3. docker compose up -d
#   4. Watch logs:  docker compose logs -f hermeece
#   5. Hit health:  curl http://localhost:8788/api/health
#
# Env vars are first-run seeds only — Hermeece writes them into
# settings.json on first startup, and after that settings.json is
# the source of truth. To CHANGE a setting after first boot, edit
# the data volume's settings.json directly (until the Phase 3
# Settings UI lands).

services:
  hermeece:
    build: .
    container_name: hermeece
    restart: unless-stopped
    ports:
      - "8788:8788"
    volumes:
      # Persistent data: hermeece.db (SQLite), settings.json,
      # auth_secret. Survives container recreation.
      - ./data:/app/data
    environment:
      # ── MAM IRC ──────────────────────────────────────────
      # Your bot nick (registered with NickServ on irc.myanonamouse.net).
      # MAM_IRC_NICK and MAM_IRC_ACCOUNT are usually different — the
      # nick is the bot's display name, the account is the NickServ
      # main account it's grouped with. Both REQUIRED for SASL auth.
      MAM_IRC_NICK: ""              # REQUIRED — e.g. "Turtles81_arrbot"
      MAM_IRC_ACCOUNT: ""           # REQUIRED — e.g. "Turtles81"
      MAM_IRC_PASSWORD: ""          # REQUIRED — your NickServ password

      # ── MAM session cookie (mam_id) ──────────────────────
      # Generated at MyAnonamouse → Preferences → Security.
      # ASN-locked is recommended (more forgiving). Hermeece will
      # validate this on first boot via the search endpoint.
      MAM_SESSION_ID: ""            # REQUIRED — long alphanumeric

      # ── qBittorrent WebUI ────────────────────────────────
      # Hermeece submits .torrent files via the qBit WebUI API.
      # Use the LAN address that bypasses your VPN namespace if
      # qBit is in a vpn'd container (the same URL Autobrr uses).
      QBIT_URL: "http://10.0.10.20:8080"   # REQUIRED — adjust IP/port
      QBIT_USERNAME: ""             # REQUIRED
      QBIT_PASSWORD: ""             # REQUIRED
      # qBit category Hermeece submits new grabs into AND polls for
      # completion / seedtime tracking. Must match the category you
      # have configured in qBit's WebUI exactly, including any
      # bracket characters. Common conventions: "mam", "[mam-reseed]",
      # "ebooks", etc. Whatever you pick, Hermeece will only see and
      # track torrents in this one category.
      QBIT_WATCH_CATEGORY: "[mam-reseed]"

      # ── Optional ─────────────────────────────────────────
      # Bind to a non-default port (avoids the AthenaScout 8787 clash)
      WEBUI_PORT: "8788"

      # Verbose logging — useful during the smoke test, set false
      # once everything is humming
      VERBOSE_LOGGING: "true"

      # ntfy notifications — leave empty to disable for the smoke test
      NTFY_URL: ""

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8788/api/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
